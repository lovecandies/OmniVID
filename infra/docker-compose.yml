name: omnivid

services:
  mysql:
    image: mysql:8.4
    container_name: omnivid-mysql
    environment:
      MYSQL_ROOT_PASSWORD: omnivid_root
      MYSQL_DATABASE: omnivid
      MYSQL_USER: omnivid
      MYSQL_PASSWORD: omnivid_pass
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    volumes:
      - omnivid_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u omnivid -pomnivid_pass --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    container_name: omnivid-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - omnivid_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: omnivid-qdrant
    ports:
      - "6333:6333"
    volumes:
      - omnivid_qdrant_data:/qdrant/storage

volumes:
  omnivid_mysql_data:
  omnivid_redis_data:
  omnivid_qdrant_data:
