name: OmniVid CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Test API
        working-directory: apps/api
        run: ./mvnw -B test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        working-directory: apps/web
        run: npm ci
      - name: Build web
        working-directory: apps/web
        run: npm run build

  docker:
    name: Docker reproducibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose
        run: docker compose -f infra/docker-compose.yml --profile app config --quiet
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t omnivid-api:ci .
      - name: Build web image
        run: docker build -f apps/web/Dockerfile --build-arg VITE_API_BASE_URL= -t omnivid-web:ci .
