spring:
  autoconfigure:
    exclude: []
  datasource:
    url: jdbc:mysql://localhost:3307/omnivid?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: omnivid
    password: omnivid_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-mysql.sql

omnivid:
  dedupe-lock:
    mode: redis
  progress-cache:
    mode: redis
  agent-rate-limit:
    mode: redis
  agent-answer-cache:
    mode: redis
  agent-short-term-memory:
    mode: redis
  vector-store:
    mode: qdrant
    qdrant:
      base-url: http://localhost:6333
      collection: omnivid_transcript_segments
      timeout: 5s
